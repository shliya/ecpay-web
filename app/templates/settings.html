<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>設定</title>
    </head>
    <body>
        <div class="settings-page">
            <header class="settings-header">
                <a href="index.html" class="back-link">← 回首頁</a>
                <h1>設定</h1>
            </header>

            <div class="settings-container">
                <div class="settings-tabs">
                    <button
                        class="tab-button active"
                        data-tab="basic"
                        id="tabBasic"
                    >
                        基本設定
                    </button>
                    <button class="tab-button" data-tab="ecpay" id="tabEcpay">
                        綠界
                    </button>
                    <button
                        class="tab-button"
                        data-tab="youtube"
                        id="tabYoutube"
                    >
                        YouTube
                    </button>
                    <button class="tab-button" data-tab="payuni" id="tabPayuni">
                        PAYUNi
                    </button>
                    <button
                        class="tab-button"
                        data-tab="youtubeDonation"
                        id="tabYoutubeDonation"
                        type="button"
                    >
                        影音斗內
                    </button>
                </div>

                <div class="settings-content">
                    <!-- 基本設定分頁 -->
                    <div class="tab-panel active" id="panelBasic">
                        <h2>基本設定</h2>
                        <form id="basicForm" class="settings-form">
                            <div class="form-group">
                                <label for="displayName">顯示名稱</label>
                                <input
                                    type="text"
                                    id="displayName"
                                    name="displayName"
                                    placeholder="用於觀眾斗內連結的名稱"
                                    maxlength="100"
                                />
                                <small class="form-hint"
                                    >此名稱會用於生成觀眾斗內連結</small
                                >
                            </div>
                            <div class="form-group">
                                <label for="blockedKeywords"
                                    >封鎖關鍵字（逗號分隔）</label
                                >
                                <input
                                    type="text"
                                    id="blockedKeywords"
                                    name="blockedKeywords"
                                    placeholder="測試,test,123"
                                />
                                <small class="form-hint"
                                    >多個關鍵字請以逗號分隔，將不會顯示含有這些字詞的留言</small
                                >
                            </div>
                            <div class="form-group">
                                <label>目前已封鎖的關鍵字</label>
                                <div
                                    id="blockedKeywordsList"
                                    class="blocked-keywords-list"
                                >
                                    尚未設定任何封鎖關鍵字
                                </div>
                            </div>
                            <button type="submit" class="btn btn-save">
                                儲存
                            </button>
                        </form>
                    </div>

                    <!-- 綠界分頁 -->
                    <div class="tab-panel" id="panelEcpay">
                        <h2>綠界設定</h2>
                        <form id="ecpayForm" class="settings-form">
                            <div class="form-group">
                                <label for="merchantId">商店代號</label>
                                <input
                                    type="text"
                                    id="merchantId"
                                    name="merchantId"
                                />
                            </div>
                            <div class="form-group">
                                <label for="hashKey">Hash Key</label>
                                <div class="password-field">
                                    <input
                                        type="password"
                                        id="hashKey"
                                        name="hashKey"
                                        placeholder="請輸入 Hash Key"
                                        maxlength="100"
                                    />
                                    <button
                                        type="button"
                                        class="password-toggle"
                                        aria-label="顯示 Hash Key"
                                        aria-pressed="false"
                                        data-show-label="顯示 Hash Key"
                                        data-hide-label="隱藏 Hash Key"
                                    >
                                        <svg
                                            class="icon-eye-open"
                                            xmlns="http://www.w3.org/2000/svg"
                                            width="20"
                                            height="20"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            aria-hidden="true"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                            />
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                            />
                                        </svg>
                                        <svg
                                            class="icon-eye-off"
                                            xmlns="http://www.w3.org/2000/svg"
                                            width="20"
                                            height="20"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            aria-hidden="true"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                            />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="hashIV">Hash IV</label>
                                <div class="password-field">
                                    <input
                                        type="password"
                                        id="hashIV"
                                        name="hashIV"
                                        placeholder="請輸入 Hash IV"
                                        maxlength="100"
                                    />
                                    <button
                                        type="button"
                                        class="password-toggle"
                                        aria-label="顯示 Hash IV"
                                        aria-pressed="false"
                                        data-show-label="顯示 Hash IV"
                                        data-hide-label="隱藏 Hash IV"
                                    >
                                        <svg
                                            class="icon-eye-open"
                                            xmlns="http://www.w3.org/2000/svg"
                                            width="20"
                                            height="20"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            aria-hidden="true"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                            />
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                            />
                                        </svg>
                                        <svg
                                            class="icon-eye-off"
                                            xmlns="http://www.w3.org/2000/svg"
                                            width="20"
                                            height="20"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            aria-hidden="true"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                            />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-save">
                                儲存
                            </button>
                        </form>
                    </div>

                    <!-- YouTube 分頁 -->
                    <div class="tab-panel" id="panelYoutube">
                        <h2>YouTube 設定</h2>
                        <form id="youtubeForm" class="settings-form">
                            <div class="form-group">
                                <label for="youtubeChannelHandle"
                                    >YouTube 頻道 Handle</label
                                >
                                <input
                                    type="text"
                                    id="youtubeChannelHandle"
                                    name="youtubeChannelHandle"
                                    placeholder="@channelname"
                                    maxlength="100"
                                />
                                <small class="form-hint"
                                    >例如：@channelname</small
                                >
                            </div>
                            <div class="form-group">
                                <label for="youtubeChannelId"
                                    >YouTube 頻道 ID</label
                                >
                                <input
                                    type="text"
                                    id="youtubeChannelId"
                                    name="youtubeChannelId"
                                    placeholder="UCxxxxxxxxxxxxxxxxxxxxx"
                                    maxlength="100"
                                />
                                <small class="form-hint"
                                    >例如：UCxxxxxxxxxxxxxxxxxxxxx</small
                                >
                            </div>
                            <button type="submit" class="btn btn-save">
                                儲存
                            </button>
                        </form>
                    </div>

                    <!-- 影音斗內定價 -->
                    <div class="tab-panel" id="panelYoutubeDonation">
                        <h2>影音斗內定價</h2>
                        <p class="yt-pricing-lead">
                            <svg
                                class="yt-pricing-icon"
                                xmlns="http://www.w3.org/2000/svg"
                                width="20"
                                height="20"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke="currentColor"
                                stroke-width="2"
                                aria-hidden="true"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
                                />
                            </svg>
                            自訂「每秒單價」，觀眾付款金額會換算成可播放秒數（單筆上限
                            <span id="ytMaxSecLabel">30</span> 秒）。
                        </p>
                        <form id="youtubeDonationForm" class="settings-form">
                            <div class="form-group">
                                <label for="youtubeDonationAmount"
                                    >每 1 秒多少錢（新台幣）</label
                                >
                                <input
                                    type="number"
                                    id="youtubeDonationAmount"
                                    name="youtubeDonationAmount"
                                    min="1"
                                    max="9999"
                                    step="1"
                                    inputmode="numeric"
                                    required
                                    autocomplete="off"
                                />
                                <small class="form-hint"
                                    >例：6 表示每播放 1 秒需 6
                                    元；觀眾付 100 元約可播 16 秒（仍受單筆上限限制）。</small
                                >
                            </div>
                            <div
                                class="yt-pricing-preview"
                                aria-labelledby="ytPreviewHeading"
                            >
                                <h3 id="ytPreviewHeading" class="yt-preview-title">
                                    試算預覽
                                </h3>
                                <div class="form-group">
                                    <label for="ytPreviewAmount"
                                        >假設觀眾付款金額（元）</label
                                    >
                                    <input
                                        type="range"
                                        id="ytPreviewAmount"
                                        min="30"
                                        max="2000"
                                        step="10"
                                        value="300"
                                    />
                                    <div class="yt-preview-row">
                                        <input
                                            type="number"
                                            id="ytPreviewAmountNum"
                                            min="1"
                                            max="100000"
                                            step="1"
                                            value="300"
                                            class="yt-preview-amount-input"
                                            aria-describedby="ytPreviewResult"
                                        />
                                        <span class="yt-preview-unit">元</span>
                                    </div>
                                </div>
                                <div
                                    id="ytPreviewResult"
                                    class="yt-preview-result"
                                    aria-live="polite"
                                >
                                    約可播放 <strong id="ytPreviewSec">—</strong> 秒
                                </div>
                                <ul
                                    class="yt-preview-examples"
                                    id="ytPreviewExamples"
                                ></ul>
                            </div>
                            <div class="form-actions-row">
                                <button
                                    type="button"
                                    class="btn btn-secondary"
                                    id="btnYoutubeDonationReset"
                                >
                                    還原預設
                                </button>
                                <button type="submit" class="btn btn-save">
                                    儲存
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- PAYUNi 分頁 -->
                    <div class="tab-panel" id="panelPayuni">
                        <h2>PAYUNi 設定</h2>
                        <form id="payuniForm" class="settings-form">
                            <div class="form-group">
                                <label for="payuniMerchantId"
                                    >PAYUNi 商店代號</label
                                >
                                <input
                                    type="text"
                                    id="payuniMerchantId"
                                    name="payuniMerchantId"
                                    placeholder="請輸入 PAYUNi 商店代號"
                                    maxlength="100"
                                />
                            </div>
                            <div class="form-group">
                                <label for="payuniHashKey"
                                    >PAYUNi Hash Key</label
                                >
                                <div class="password-field">
                                    <input
                                        type="password"
                                        id="payuniHashKey"
                                        name="payuniHashKey"
                                        placeholder="請輸入 PAYUNi Hash Key"
                                        maxlength="100"
                                    />
                                    <button
                                        type="button"
                                        class="password-toggle"
                                        aria-label="顯示 PAYUNi Hash Key"
                                        aria-pressed="false"
                                        data-show-label="顯示 PAYUNi Hash Key"
                                        data-hide-label="隱藏 PAYUNi Hash Key"
                                    >
                                        <svg
                                            class="icon-eye-open"
                                            xmlns="http://www.w3.org/2000/svg"
                                            width="20"
                                            height="20"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            aria-hidden="true"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                            />
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                            />
                                        </svg>
                                        <svg
                                            class="icon-eye-off"
                                            xmlns="http://www.w3.org/2000/svg"
                                            width="20"
                                            height="20"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            aria-hidden="true"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                            />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="payuniHashIV">PAYUNi Hash IV</label>
                                <div class="password-field">
                                    <input
                                        type="password"
                                        id="payuniHashIV"
                                        name="payuniHashIV"
                                        placeholder="請輸入 PAYUNi Hash IV"
                                        maxlength="100"
                                    />
                                    <button
                                        type="button"
                                        class="password-toggle"
                                        aria-label="顯示 PAYUNi Hash IV"
                                        aria-pressed="false"
                                        data-show-label="顯示 PAYUNi Hash IV"
                                        data-hide-label="隱藏 PAYUNi Hash IV"
                                    >
                                        <svg
                                            class="icon-eye-open"
                                            xmlns="http://www.w3.org/2000/svg"
                                            width="20"
                                            height="20"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            aria-hidden="true"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                            />
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                            />
                                        </svg>
                                        <svg
                                            class="icon-eye-off"
                                            xmlns="http://www.w3.org/2000/svg"
                                            width="20"
                                            height="20"
                                            fill="none"
                                            viewBox="0 0 24 24"
                                            stroke="currentColor"
                                            stroke-width="2"
                                            aria-hidden="true"
                                        >
                                            <path
                                                stroke-linecap="round"
                                                stroke-linejoin="round"
                                                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                            />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-save">
                                儲存
                            </button>
                        </form>
                    </div>
                </div>

                <div class="settings-message" id="settingsMessage"></div>
            </div>
        </div>
    </body>
</html>
