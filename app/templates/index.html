<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>山老鼠-不敢互動</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="app-layout">
            <a class="skip-link" href="#mainContent">跳到主要內容</a>
            <header class="app-header">
                <div class="header-left">
                    <h1 class="app-title">鼠做小工具</h1>
                    <div class="merchant-info">
                        <span>商店代號：</span>
                        <span id="merchantId" class="merchant-id loading"
                            >載入中...</span
                        >
                    </div>
                </div>
                <div class="header-right">
                    <button
                        class="btn btn-settings"
                        id="settingsBtn"
                        type="button"
                        title="設定"
                    >
                        <svg
                            class="btn-settings-icon"
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                            width="18"
                            height="18"
                            aria-hidden="true"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"
                            />
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                            />
                        </svg>
                        設定
                    </button>
                    <button class="btn btn-logout" id="logoutBtn" type="button">
                        登出
                    </button>
                </div>
            </header>

            <div class="app-body">
                <nav class="sidebar" id="sidebar">
                    <ul class="nav-list">
                        <li
                            class="nav-item"
                            data-page="donate-list"
                            id="navDonateList"
                            tabindex="0"
                            role="button"
                        >
                            <span class="nav-icon" aria-hidden="true"
                                ><svg
                                    class="nav-icon-svg"
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"
                                    />
                                </svg>
                            </span>
                            <span class="nav-label">錢錢列表</span>
                        </li>
                        <li
                            class="nav-item"
                            data-page="event-list"
                            id="navEventList"
                            tabindex="0"
                            role="button"
                        >
                            <span class="nav-icon" aria-hidden="true"
                                ><svg
                                    class="nav-icon-svg"
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v7.125c0 .621-.504 1.125-1.125 1.125h-2.25A1.125 1.125 0 013 20.25v-7.125zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"
                                    />
                                </svg>
                            </span>
                            <span class="nav-label">募資條/血壓條</span>
                        </li>
                        <li
                            class="nav-item"
                            data-page="ichiban"
                            id="navIchiban"
                            tabindex="0"
                            role="button"
                        >
                            <span class="nav-icon" aria-hidden="true"
                                ><svg
                                    class="nav-icon-svg"
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M21 11.25v8.25a1.5 1.5 0 01-1.5 1.5H5.25a1.5 1.5 0 01-1.5-1.5v-8.25M12 4.875A2.625 2.625 0 109.375 7.5H12m0-2.625V7.5m0-2.625A2.625 2.625 0 1114.625 7.5H12m0 0V21m-8.625-9.75h17.25c.621 0 1.125-.504 1.125-1.125v-2.25c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v2.25c0 .621.504 1.125 1.125 1.125z"
                                    />
                                </svg>
                            </span>
                            <span class="nav-label">一番賞管理</span>
                        </li>
                        <li
                            class="nav-item"
                            data-page="donate-theme"
                            id="navDonateTheme"
                            tabindex="0"
                            role="button"
                        >
                            <span class="nav-icon" aria-hidden="true"
                                ><svg
                                    class="nav-icon-svg"
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M9.53 16.122a3 3 0 00-5.78 1.128 2.25 2.25 0 01-2.4 2.245 4.5 4.5 0 008.4-2.245c0-.399-.078-.78-.22-1.128zm0 0a15.998 15.998 0 003.388-1.62m-5.043-.025a15.994 15.994 0 011.622-3.395m3.42 3.42a15.995 15.995 0 004.764-4.648l3.876-5.814a1.151 1.151 0 00-1.597-1.597L14.146 6.32a15.996 15.996 0 00-4.649 4.763m0 0a15.998 15.998 0 01-4.769 4.768l-3.876 5.814a1.151 1.151 0 01-1.597-1.597l3.876-5.814a15.996 15.996 0 014.769-4.768z"
                                    />
                                </svg>
                            </span>
                            <span class="nav-label">斗內頁顏色</span>
                        </li>
                        <li
                            class="nav-item"
                            data-page="donation-overlay-settings"
                            id="navDonationOverlaySettings"
                            tabindex="0"
                            role="button"
                        >
                            <span class="nav-icon" aria-hidden="true"
                                ><svg
                                    class="nav-icon-svg"
                                    xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M6 20.25h12m-7.5-3v3m3-3v3m-10.125-3h17.25c.621 0 1.125-.504 1.125-1.125V4.875c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125z"
                                    />
                                </svg>
                            </span>
                            <span class="nav-label">OBS 斗內通知</span>
                        </li>
                    </ul>

                    <div class="sidebar-links">
                        <div class="donate-link-section">
                            <label class="donate-link-label"
                                >觀眾斗內連結</label
                            >
                            <div class="donate-link-row">
                                <input
                                    type="text"
                                    id="viewerDonateUrl"
                                    class="donate-link-input"
                                    readonly
                                    placeholder="載入中…"
                                />
                                <button
                                    type="button"
                                    class="btn btn-copy-link"
                                    id="copyDonateLinkBtn"
                                >
                                    複製
                                </button>
                            </div>
                        </div>
                        <div class="donate-link-section">
                            <label class="donate-link-label"
                                >觀眾影片斗內連結</label
                            >
                            <div class="donate-link-row">
                                <input
                                    type="text"
                                    id="viewerDonateYoutubeUrl"
                                    class="donate-link-input"
                                    readonly
                                    placeholder="載入中…"
                                />
                                <button
                                    type="button"
                                    class="btn btn-copy-link"
                                    id="copyDonateYoutubeLinkBtn"
                                >
                                    複製
                                </button>
                            </div>
                        </div>
                    </div>

                    <button
                        class="sidebar-toggle"
                        id="sidebarToggle"
                        type="button"
                        title="收合選單"
                        aria-expanded="true"
                        aria-controls="sidebar"
                    >
                        ‹
                    </button>
                </nav>

                <main class="content-area" id="mainContent" tabindex="-1">
                    <div
                        id="contentToolbar"
                        class="content-toolbar"
                        style="display: none"
                    >
                        <h2 class="toolbar-title" id="toolbarTitle"></h2>
                        <div class="toolbar-links" id="toolbarLinks"></div>
                    </div>

                    <div id="homeContent" class="content-page active">
                        <div class="home-empty-hint">
                            <p>請從左側選單選擇功能</p>
                            <p class="home-empty-narrow">
                                若畫面太窄看不到左側「觀眾斗內連結」或「觀眾影片斗內連結」，請將視窗拉寬或使用電腦複製。
                            </p>
                        </div>
                    </div>

                    <iframe
                        id="contentFrame"
                        class="content-frame"
                        style="display: none"
                    ></iframe>
                </main>
            </div>

            <footer class="app-footer">
                <p>不介意可以給鼠一點錢拉嘿嘿</p>
                <a target="_blank" href="https://p.ecpay.com.tw/9C1A29E"
                    >養我</a
                >
                <span class="footer-sep">|</span>
                <span class="footer-contact">有問題歡迎聯絡鼠鼠</span>
            </footer>
        </div>
    </body>
</html>
