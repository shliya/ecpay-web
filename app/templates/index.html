<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>山老鼠-不敢互動</title>
    </head>
    <body>
        <div class="app-layout">
            <header class="app-header">
                <div class="header-left">
                    <h1 class="app-title">鼠做小工具</h1>
                    <div class="merchant-info">
                        <span>商店代號：</span>
                        <span id="merchantId" class="merchant-id loading"
                            >載入中...</span
                        >
                    </div>
                </div>
                <div class="header-right">
                    <button
                        class="btn btn-settings"
                        id="settingsBtn"
                        title="設定"
                    >
                        ⚙️ 設定
                    </button>
                    <button class="btn btn-logout" id="logoutBtn">登出</button>
                </div>
            </header>

            <div class="app-body">
                <nav class="sidebar" id="sidebar">
                    <ul class="nav-list">
                        <li
                            class="nav-item"
                            data-page="donate-list"
                            id="navDonateList"
                        >
                            <span class="nav-icon">💰</span>
                            <span class="nav-label">錢錢列表</span>
                        </li>
                        <li
                            class="nav-item"
                            data-page="event-list"
                            id="navEventList"
                        >
                            <span class="nav-icon">📊</span>
                            <span class="nav-label">募資條/血壓條</span>
                        </li>
                        <li
                            class="nav-item"
                            data-page="ichiban"
                            id="navIchiban"
                        >
                            <span class="nav-icon">🎰</span>
                            <span class="nav-label">一番賞管理</span>
                        </li>
                        <li
                            class="nav-item"
                            data-page="donate-theme"
                            id="navDonateTheme"
                        >
                            <span class="nav-icon">🎨</span>
                            <span class="nav-label">斗內頁顏色</span>
                        </li>
                        <li
                            class="nav-item"
                            data-page="donation-overlay-settings"
                            id="navDonationOverlaySettings"
                        >
                            <span class="nav-icon">📺</span>
                            <span class="nav-label">OBS 斗內通知</span>
                        </li>
                    </ul>

                    <div class="sidebar-links">
                        <div class="donate-link-section">
                            <label class="donate-link-label"
                                >觀眾斗內連結</label
                            >
                            <div class="donate-link-row">
                                <input
                                    type="text"
                                    id="viewerDonateUrl"
                                    class="donate-link-input"
                                    readonly
                                    placeholder="載入中…"
                                />
                                <button
                                    type="button"
                                    class="btn btn-copy-link"
                                    id="copyDonateLinkBtn"
                                >
                                    複製
                                </button>
                            </div>
                        </div>
                    </div>

                    <button
                        class="sidebar-toggle"
                        id="sidebarToggle"
                        title="收合選單"
                    >
                        ‹
                    </button>
                </nav>

                <main class="content-area">
                    <div
                        id="contentToolbar"
                        class="content-toolbar"
                        style="display: none"
                    >
                        <h2 class="toolbar-title" id="toolbarTitle"></h2>
                        <div class="toolbar-links" id="toolbarLinks"></div>
                    </div>

                    <div id="homeContent" class="content-page active">
                        <div class="home-empty-hint">
                            <p>請從左側選單選擇功能</p>
                            <p class="home-empty-narrow">
                                若畫面太窄看不到左側「觀眾斗內連結」，請將視窗拉寬或使用電腦複製。
                            </p>
                        </div>
                    </div>

                    <iframe
                        id="contentFrame"
                        class="content-frame"
                        style="display: none"
                    ></iframe>
                </main>
            </div>

            <footer class="app-footer">
                <p>不介意可以給鼠一點錢拉嘿嘿</p>
                <a target="_blank" href="https://p.ecpay.com.tw/9C1A29E"
                    >養我</a
                >
                <span class="footer-sep">|</span>
                <span class="footer-contact">有問題歡迎聯絡鼠鼠</span>
            </footer>
        </div>
    </body>
</html>
