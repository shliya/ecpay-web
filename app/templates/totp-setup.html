<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>綁定 Google Authenticator</title>
    </head>
    <body>
        <div class="totp-setup-container">
            <h1>綁定 Google Authenticator</h1>
            <p class="totp-hint">
                為保障帳號安全，請先以金流 Hash Key 驗證商店所有權，再綁定
                Google Authenticator
            </p>
            <form id="ownershipForm" class="ownership-form">
                <div class="form-group">
                    <label for="hashKey">綠界 Hash Key</label>
                    <input
                        type="password"
                        id="hashKey"
                        name="hashKey"
                        autocomplete="off"
                        placeholder="若為綠界商店請填寫"
                    />
                </div>
                <div class="form-group">
                    <label for="payuniHashKey">PayUni Hash Key（選填）</label>
                    <input
                        type="password"
                        id="payuniHashKey"
                        name="payuniHashKey"
                        autocomplete="off"
                        placeholder="若為 PayUni 商店可改填此欄"
                    />
                </div>
                <button type="submit" class="btn-confirm" id="btnLoadQr">
                    驗證並顯示 QR Code
                </button>
            </form>
            <div id="qrContainer" class="qr-container" style="display: none">
                <p>請使用 Google Authenticator 掃描下方 QR Code</p>
                <div id="qrCode"></div>
                <p class="manual-secret">
                    或手動輸入金鑰：<code id="manualSecret"></code>
                </p>
            </div>
            <div id="loadingMsg" class="loading-msg" style="display: none">
                載入中...
            </div>
            <form id="confirmForm" style="display: none">
                <div class="form-group">
                    <input
                        type="text"
                        id="totpToken"
                        name="totpToken"
                        maxlength="6"
                        placeholder="請輸入6位數驗證碼"
                        autocomplete="one-time-code"
                    />
                </div>
                <button type="submit" class="btn-confirm">完成綁定</button>
            </form>
            <div id="message" class="message" style="display: none"></div>
        </div>
    </body>
</html>
