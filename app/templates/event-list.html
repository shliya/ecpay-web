<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>斗內活動列表</title>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>斗內活動列表</h1>
                <div class="header-buttons">
                    <button id="createBtn" class="btn btn-create">
                        + 新增活動
                    </button>
                    <button id="refreshBtn" class="btn btn-refresh">
                        重新整理
                    </button>
                </div>
            </div>
            <div class="loading" id="loading">載入中...</div>
            <div class="error" id="errorMessage" style="display: none"></div>
            <div class="event-list" id="eventList"></div>
        </div>

        <!-- 新增活動彈出視窗 -->
        <div id="createModal" class="modal" style="display: none">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>新增募資活動</h2>
                    <button class="modal-close" id="closeModal">&times;</button>
                </div>
                <form id="createEventForm" class="modal-body">
                    <div class="form-group">
                        <label for="eventName"
                            >活動名稱 <span class="required">*</span></label
                        >
                        <input
                            type="text"
                            id="eventName"
                            name="eventName"
                            required
                            maxlength="100"
                            placeholder="請輸入活動名稱"
                        />
                    </div>

                    <div class="form-group">
                        <label for="eventType"
                            >活動類型 <span class="required">*</span></label
                        >
                        <select id="eventType" name="type" required>
                            <option value="1">打怪</option>
                            <option value="2" selected>普通</option>
                            <option value="3">血壓飆升(給我說話)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="totalAmount"
                            >目標金額 <span class="required">*</span></label
                        >
                        <input
                            type="number"
                            id="totalAmount"
                            name="totalAmount"
                            required
                            min="1"
                            placeholder="請輸入目標金額"
                            value="1500"
                        />
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="startMonth"
                                >開始日期 <span class="required">*</span></label
                            >
                            <input
                                type="date"
                                id="startMonth"
                                name="startMonth"
                                required
                            />
                        </div>
                        <div class="form-group">
                            <label for="endMonth"
                                >結束日期 <span class="required">*</span></label
                            >
                            <input
                                type="date"
                                id="endMonth"
                                name="endMonth"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">活動描述</label>
                        <textarea
                            id="description"
                            name="description"
                            rows="3"
                            placeholder="請輸入活動描述（選填）"
                        ></textarea>
                    </div>

                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            id="cancelBtn"
                        >
                            取消
                        </button>
                        <button
                            type="submit"
                            class="btn btn-primary"
                            id="submitBtn"
                        >
                            建立活動
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 查看斗內：右側抽屜，點遮罩關閉 -->
        <div
            id="donationsDrawer"
            class="donations-drawer-overlay"
            aria-hidden="true"
        >
            <aside
                class="donations-drawer"
                role="dialog"
                aria-modal="true"
                aria-labelledby="donationsDrawerTitle"
                tabindex="-1"
            >
                <div class="donations-drawer-header">
                    <h2 id="donationsDrawerTitle">活動期間斗內紀錄</h2>
                    <button
                        type="button"
                        class="donations-drawer-close"
                        id="donationsDrawerClose"
                        aria-label="關閉"
                    >
                        &times;
                    </button>
                </div>
                <p class="donations-drawer-range" id="donationsDrawerRange"></p>
                <div
                    class="donations-drawer-loading"
                    id="donationsDrawerLoading"
                >
                    載入中...
                </div>
                <div
                    class="donations-drawer-error"
                    id="donationsDrawerError"
                    style="display: none"
                ></div>
                <div
                    class="donations-drawer-scroll"
                    id="donationsDrawerTableWrap"
                    style="display: none"
                >
                    <table class="donations-drawer-table">
                        <thead>
                            <tr>
                                <th scope="col">暱稱</th>
                                <th scope="col">金額</th>
                                <th scope="col">訊息</th>
                                <th scope="col">類型</th>
                                <th scope="col">日期</th>
                            </tr>
                        </thead>
                        <tbody id="donationsDrawerRows"></tbody>
                    </table>
                </div>
                <div
                    class="donations-drawer-empty"
                    id="donationsDrawerEmpty"
                    style="display: none"
                >
                    <p>此期間沒有斗內紀錄</p>
                </div>
            </aside>
        </div>

        <div id="editTitleModal" class="modal" style="display: none">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>修改活動標題</h2>
                    <button class="modal-close" id="closeEditTitleModal">
                        &times;
                    </button>
                </div>
                <form id="editTitleForm" class="modal-body">
                    <div class="form-group">
                        <label for="editEventName"
                            >活動名稱 <span class="required">*</span></label
                        >
                        <input
                            type="text"
                            id="editEventName"
                            name="eventName"
                            required
                            maxlength="100"
                            placeholder="請輸入新的活動名稱"
                        />
                    </div>

                    <div class="modal-footer">
                        <button
                            type="button"
                            class="btn btn-secondary"
                            id="cancelEditTitleBtn"
                        >
                            取消
                        </button>
                        <button
                            type="submit"
                            class="btn btn-primary"
                            id="submitEditTitleBtn"
                        >
                            確認修改
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
