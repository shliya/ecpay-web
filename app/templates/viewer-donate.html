<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>支持實況主 - 斗內</title>
    </head>
    <body>
        <div class="window" id="donateWindow">
            <div class="title">▶ 支持實況主</div>
            <div
                id="lcfDonateWarning"
                class="lcf-donate-warning"
                hidden
                role="note"
            ></div>
            <div class="error" id="errorMsg"></div>
            <div class="label">NAME</div>
            <input class="input" id="nickname" placeholder="你的暱稱" />
            <div class="label">DONATION（金額）</div>
            <input class="input" id="amount" type="number" min="30" step="1" />
            <div class="quick">
                <button type="button" data-value="100">100</button>
                <button type="button" data-value="300">300</button>
                <button type="button" data-value="800">800</button>
            </div>
            <div class="label">MESSAGE</div>
            <textarea
                class="textarea"
                id="message"
                placeholder="想對實況主說的話…"
            ></textarea>
            <div class="donate-payments" id="donatePayments">
                <button
                    class="btn-ecpay donate-pay donate-pay--ecpay"
                    id="btnEcpay"
                    type="button"
                >
                    綠界斗內
                </button>
                <a href="#" id="linkPayuni" class="btn-payuni donate-pay donate-pay--payuni"
                    >PayUni 斗內</a
                >
                <a href="#" id="linkOpay" class="btn-opay donate-pay donate-pay--opay"
                    >歐付寶斗內</a
                >
            </div>
        </div>

        <div
            id="lcfFormModal"
            class="modal donate-modal"
            style="display: none"
            role="dialog"
            aria-modal="true"
            aria-labelledby="lcfFormStepTitle"
            aria-hidden="true"
        >
            <div class="modal-content donate-modal__content">
                <div class="modal-header donate-modal__header">
                    <h2 id="lcfFormStepTitle">贊助者資料表單</h2>
                    <button
                        type="button"
                        class="modal-close donate-modal__close"
                        id="lcfFormCloseBtn"
                        aria-label="關閉"
                    >
                        &times;
                    </button>
                </div>
                <div class="modal-body donate-modal__body">
                    <p class="donate-modal__hint" id="lcfFormStepHint"></p>
                    <a
                        id="lcfFormOpenLink"
                        class="donate-modal__open"
                        href="#"
                        target="_blank"
                        rel="noopener noreferrer"
                        hidden
                        >前往填寫 Google 表單</a
                    >
                </div>
                <div class="modal-footer donate-modal__footer">
                    <button
                        type="button"
                        class="donate-modal__back"
                        id="lcfFormBackBtn"
                    >
                        返回斗內
                    </button>
                    <button
                        type="button"
                        class="donate-modal__confirm"
                        id="lcfFormConfirmBtn"
                    >
                        已完成填寫，繼續付款
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
