<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>商店設定</title>
    </head>
    <body>
        <div class="setting-container">
            <h1>商店金流設定</h1>
            <p class="setting-hint">
                請依使用的金流擇一填寫：綠界 ECPay 或 PayUni
            </p>
            <div class="tabs">
                <button type="button" class="tab-btn active" data-tab="ecpay">
                    綠界 ECPay
                </button>
                <button type="button" class="tab-btn" data-tab="payuni">
                    PAYUNI
                </button>
            </div>

            <div id="ecpayPanel" class="tab-panel active">
                <form id="ecpaySettingForm">
                    <div class="form-group">
                        <label for="merchantId">商店代號</label>
                        <input
                            type="text"
                            id="merchantId"
                            name="merchantId"
                            required
                            placeholder="請輸入商店代號"
                        />
                    </div>
                    <div class="form-group">
                        <label for="hashKey">Hash Key</label>
                        <div class="password-field">
                            <input
                                type="password"
                                id="hashKey"
                                name="hashKey"
                                required
                                placeholder="請輸入 Hash Key"
                            />
                            <button
                                type="button"
                                class="password-toggle"
                                aria-label="顯示 Hash Key"
                                aria-pressed="false"
                                data-show-label="顯示 Hash Key"
                                data-hide-label="隱藏 Hash Key"
                            >
                                <svg
                                    class="icon-eye-open"
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                    />
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                    />
                                </svg>
                                <svg
                                    class="icon-eye-off"
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                    />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="hashIV">Hash IV</label>
                        <div class="password-field">
                            <input
                                type="password"
                                id="hashIV"
                                name="hashIV"
                                required
                                placeholder="請輸入 Hash IV"
                            />
                            <button
                                type="button"
                                class="password-toggle"
                                aria-label="顯示 Hash IV"
                                aria-pressed="false"
                                data-show-label="顯示 Hash IV"
                                data-hide-label="隱藏 Hash IV"
                            >
                                <svg
                                    class="icon-eye-open"
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                    />
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                    />
                                </svg>
                                <svg
                                    class="icon-eye-off"
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                    />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">儲存設定</button>
                </form>
            </div>

            <div id="payuniPanel" class="tab-panel">
                <form id="payuniSettingForm">
                    <div class="form-group">
                        <label for="payuniMerchantId">PayUni 商店代號</label>
                        <input
                            type="text"
                            id="payuniMerchantId"
                            name="payuniMerchantId"
                            required
                            placeholder="請輸入 PayUni 商店代號"
                        />
                    </div>
                    <div class="form-group">
                        <label for="payuniHashKey">PayUni Hash Key</label>
                        <div class="password-field">
                            <input
                                type="password"
                                id="payuniHashKey"
                                name="payuniHashKey"
                                required
                                placeholder="請輸入 PayUni Hash Key"
                            />
                            <button
                                type="button"
                                class="password-toggle"
                                aria-label="顯示 PayUni Hash Key"
                                aria-pressed="false"
                                data-show-label="顯示 PayUni Hash Key"
                                data-hide-label="隱藏 PayUni Hash Key"
                            >
                                <svg
                                    class="icon-eye-open"
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                    />
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                    />
                                </svg>
                                <svg
                                    class="icon-eye-off"
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                    />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="payuniHashIV">PayUni Hash IV</label>
                        <div class="password-field">
                            <input
                                type="password"
                                id="payuniHashIV"
                                name="payuniHashIV"
                                required
                                placeholder="請輸入 PayUni Hash IV"
                            />
                            <button
                                type="button"
                                class="password-toggle"
                                aria-label="顯示 PayUni Hash IV"
                                aria-pressed="false"
                                data-show-label="顯示 PayUni Hash IV"
                                data-hide-label="隱藏 PayUni Hash IV"
                            >
                                <svg
                                    class="icon-eye-open"
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                                    />
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                                    />
                                </svg>
                                <svg
                                    class="icon-eye-off"
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                    stroke-width="2"
                                    aria-hidden="true"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
                                    />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">儲存設定</button>
                </form>
            </div>

            <div id="message" class="message" style="display: none"></div>
        </div>
    </body>
</html>
