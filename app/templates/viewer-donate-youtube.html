<!doctype html>
<html lang="zh-Hant">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>支持實況主 - 影片斗內（YouTube）</title>
    </head>
    <body>
        <div class="window">
            <div class="title">▶ 支持實況主 · 影片斗內</div>
            <div class="error" id="errorMsg"></div>
            <div class="label">NAME</div>
            <input class="input" id="nickname" placeholder="你的暱稱" />
            <div class="label">DONATION（金額）</div>
            <input class="input" id="amount" type="number" min="1" step="1" />
            <div class="quick">
                <button type="button" data-value="100">100</button>
                <button type="button" data-value="300">300</button>
                <button type="button" data-value="500">500</button>
            </div>
            <p class="yt-hint" id="ytSecondsHint">
                貼上 YouTube 影片連結後，會依商店設定的每秒單價換算可播放秒數。
            </p>
            <div class="label">YOUTUBE 影片</div>
            <input
                class="input"
                id="youtubeUrl"
                type="url"
                placeholder="https://youtu.be/… 或 watch?v=…（可含 &amp;t=秒數）"
            />
            <div class="label">MESSAGE</div>
            <textarea
                class="textarea"
                id="message"
                placeholder="想對實況主說的話…"
            ></textarea>
            <button class="btn-ecpay" id="btnEcpay" type="button">
                用綠界斗內
            </button>
            <div class="alt-links">
                <a href="#" id="linkPayuni" class="btn-payuni"
                    >或用 PayUni 斗內</a
                >
                <span class="alt-sep">·</span>
            </div>
        </div>
    </body>
</html>
